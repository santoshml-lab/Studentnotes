<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ExamPanic AI Notes PDF 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* SAME CSS (UNCHANGED) */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(circle at top left,#38bdf830,transparent 25%),
radial-gradient(circle at bottom right,#6366f130,transparent 25%),
#020617;
color:white;
min-height:100vh;
overflow-x:hidden;
}

.nav{
width:100%;
padding:22px 7%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:700;
color:#38bdf8;
}

.nav-btn{
padding:12px 22px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#38bdf8,#6366f1);
color:white;
font-weight:600;
cursor:pointer;
}

.hero{
width:90%;
max-width:1400px;
margin:auto;
margin-top:35px;
padding:45px;
border-radius:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
box-shadow:0 0 40px rgba(56,189,248,0.15);
}

.hero h1{font-size:50px;}
.hero span{color:#38bdf8;}

.main{
width:90%;
max-width:1400px;
margin:auto;
margin-top:30px;
display:grid;
grid-template-columns:380px 1fr;
gap:25px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
}

input,select{
width:100%;
padding:14px;
margin-top:14px;
border:none;
outline:none;
border-radius:16px;
background:#111827;
color:white;
}

.btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:16px;
background:linear-gradient(45deg,#38bdf8,#6366f1);
color:white;
font-weight:700;
cursor:pointer;
}

.btn:hover{transform:scale(1.02);}

.output{
background:#0f172a;
padding:25px;
border-radius:22px;
min-height:600px;
margin-top:15px;
border:1px solid rgba(255,255,255,0.06);
line-height:1.8;
overflow:auto;
}

.loader{
display:none;
color:#38bdf8;
font-weight:600;
margin-bottom:10px;
}

@media(max-width:1000px){
.main{grid-template-columns:1fr;}
.hero h1{font-size:38px;}
}

</style>

</head>

<body>

<div class="nav">
<div class="logo">📚 ExamPanic AI Notes</div>
<button class="nav-btn">PDF Mode</button>
</div>

<div class="hero">
<h1>Generate <span>Class Wise AI Notes</span> 🚀</h1>
</div>

<div class="main">

<div class="card">

<select id="cls">
<option value="">Class</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
</select>

<input id="subject" placeholder="Subject">
<input id="chapter" placeholder="Chapter">

<!-- 🌐 LANGUAGE ADDED -->
<select id="lang">
<option value="english">English</option>
<option value="hindi">Hindi</option>
</select>

<button class="btn" onclick="generateNotes()">
Generate Notes
</button>

<button class="btn" onclick="downloadPDF()">
Download PDF
</button>

</div>

<div class="card">

<h2>📖 Notes Output</h2>

<div class="loader" id="loader">
⚡ AI is generating notes...
</div>

<div id="notesBox" class="output">
Your notes will appear here...
</div>

</div>

</div>

<script>

const API = "https://student-learning-system-r6bi.onrender.com";

let lastNotes = "";

/* GENERATE NOTES */
async function generateNotes(){

let cls = document.getElementById("cls").value;
let subject = document.getElementById("subject").value;
let chapter = document.getElementById("chapter").value;
let lang = document.getElementById("lang").value;

if(!cls || !subject || !chapter){
alert("Fill all fields");
return;
}

document.getElementById("loader").style.display = "block";

try{

let res = await fetch(API + "/generate-notes",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
student_name:"demo",
student_class:cls,
subject:subject,
chapter:chapter,
language:lang   // 🔥 NEW
})
});

let data = await res.json();

if(data.status !== "success"){
document.getElementById("notesBox").innerHTML = "❌ Backend Error";
return;
}

lastNotes = data.notes || "";
document.getElementById("notesBox").innerHTML = marked.parse(lastNotes);

}
catch(err){
document.getElementById("notesBox").innerHTML = "❌ Backend Error";
}
finally{
document.getElementById("loader").style.display = "none";
}
}

/* PDF */
function downloadPDF(){

if(!lastNotes){
alert("No notes to download!");
return;
}

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let lines = lastNotes.split("\n");
let y = 12;

doc.setFontSize(12);

lines.forEach(line => {

if(y > 280){
doc.addPage();
y = 12;
}

doc.text(line, 10, y);
y += 8;

});

doc.save("ExamPanic_Notes.pdf");
}

</script>

</body>
</html>
